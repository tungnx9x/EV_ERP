<style>
#erd svg { max-width: 100%; }
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  Roles ||--o{ Users : "1 role - N users"
  Roles ||--o{ RolePermissions : has
  Permissions ||--o{ RolePermissions : has
  Modules ||--o{ Permissions : contains

  CustomerGroups ||--o{ Customers : groups
  Users ||--o{ Customers : "sales person"
  Customers ||--o{ CustomerContacts : "has contacts"
  Customers ||--o{ CustomerNotes : "has notes"
  Customers ||--o{ CustomerPrices : "custom price"

  Vendors ||--o{ VendorContacts : "has contacts"
  Vendors ||--o{ VendorPrices : "supply price"

  ProductCategories ||--o{ Products : categorizes
  Units ||--o{ Products : "unit of measure"
  Products ||--o{ VendorPrices : "buy from"
  Products ||--o{ CustomerPrices : "sell to"
  Products ||--o{ Inventory : "stock level"
  Products ||--o{ ProductImages : "has images"

  Customers ||--o{ Quotations : "receives quote"
  Users ||--o{ Quotations : "created by"
  Quotations ||--o{ QuotationItems : "has lines"
  Products ||--o{ QuotationItems : listed
  Quotations ||--o{ QuotationEmailHistory : "email sent"
  PdfTemplates ||--o{ Quotations : "uses template"

  Quotations ||--o| SalesOrders : "converts to"
  Customers ||--o{ SalesOrders : "buys from"
  SalesOrders ||--o{ SalesOrderItems : "has lines"
  Products ||--o{ SalesOrderItems : listed

  Vendors ||--o{ PurchaseOrders : "supplies"
  SalesOrders ||--o{ PurchaseOrders : "triggers PO"
  PurchaseOrders ||--o{ PurchaseOrderItems : "has lines"
  Products ||--o{ PurchaseOrderItems : listed
  PurchaseOrders ||--o{ VendorInvoices : "invoiced"

  Warehouses ||--o{ Inventory : stores
  Warehouses ||--o{ StockTransactions : "in-out"
  StockTransactions ||--o{ StockTransactionItems : "has lines"
  PurchaseOrders ||--o{ StockTransactions : "inbound"
  SalesOrders ||--o{ StockTransactions : "outbound"

  Customers ||--o{ CustomerPayments : "pays AR"
  Vendors ||--o{ VendorPayments : "receives AP"

  Roles {
    int RoleId PK
    string RoleCode
    string RoleName
  }
  Users {
    int UserId PK
    string Email
    int RoleId FK
  }
  Modules {
    int ModuleId PK
    string ModuleCode
  }
  Permissions {
    int PermissionId PK
    int ModuleId FK
    string ActionType
  }
  RolePermissions {
    int RoleId FK
    int PermissionId FK
    string DataScope
  }
  CustomerGroups {
    int CustomerGroupId PK
    string GroupCode
    int PriorityLevel
  }
  Customers {
    int CustomerId PK
    string CustomerCode
    string CustomerName
    string TaxCode
    int CustomerGroupId FK
    int SalesPersonId FK
  }
  CustomerContacts {
    int ContactId PK
    int CustomerId FK
    string ContactName
    string JobTitle
  }
  CustomerNotes {
    int NoteId PK
    int CustomerId FK
    string NoteContent
  }
  Vendors {
    int VendorId PK
    string VendorCode
    string VendorName
    string TaxCode
    string BankAccountNo
  }
  VendorContacts {
    int ContactId PK
    int VendorId FK
    string ContactName
  }
  ProductCategories {
    int CategoryId PK
    string CategoryCode
    int ParentCategoryId FK
  }
  Units {
    int UnitId PK
    string UnitCode
    string UnitName
  }
  Products {
    int ProductId PK
    string ProductCode
    string Barcode
    int CategoryId FK
    int UnitId FK
    decimal DefaultSalePrice
    int MinStockLevel
  }
  ProductImages {
    int ImageId PK
    int ProductId FK
    string ImageUrl
  }
  VendorPrices {
    int VendorPriceId PK
    int ProductId FK
    int VendorId FK
    decimal PurchasePrice
  }
  CustomerPrices {
    int CustomerPriceId PK
    int ProductId FK
    int CustomerId FK
    int CustomerGroupId FK
    decimal SalePrice
  }
  Quotations {
    int QuotationId PK
    string QuotationNo
    int CustomerId FK
    string Status
    decimal TotalAmount
    int SalesPersonId FK
    int TemplateId FK
  }
  QuotationItems {
    int QuotationItemId PK
    int QuotationId FK
    int ProductId FK
    decimal Quantity
    decimal UnitPrice
  }
  QuotationEmailHistory {
    int EmailHistoryId PK
    int QuotationId FK
    string SentTo
    string Status
  }
  SalesOrders {
    int SalesOrderId PK
    string SalesOrderNo
    int QuotationId FK
    int CustomerId FK
    string Status
    decimal TotalAmount
    int SalesPersonId FK
  }
  SalesOrderItems {
    int SOItemId PK
    int SalesOrderId FK
    int ProductId FK
    decimal Quantity
    decimal DeliveredQty
  }
  PurchaseOrders {
    int PurchaseOrderId PK
    string PurchaseOrderNo
    int VendorId FK
    int SalesOrderId FK
    string Status
    bit IsDropship
    decimal TotalAmount
  }
  PurchaseOrderItems {
    int POItemId PK
    int PurchaseOrderId FK
    int ProductId FK
    decimal Quantity
    decimal ReceivedQty
    int SOItemId FK
  }
  VendorInvoices {
    int VendorInvoiceId PK
    int PurchaseOrderId FK
    int VendorId FK
    decimal TotalAmount
    string Status
  }
  Warehouses {
    int WarehouseId PK
    string WarehouseCode
    bit IsVirtual
  }
  Inventory {
    int InventoryId PK
    int ProductId FK
    int WarehouseId FK
    decimal QuantityOnHand
    decimal QuantityReserved
  }
  StockTransactions {
    bigint TransactionId PK
    string TransactionType
    int WarehouseId FK
    int PurchaseOrderId FK
    int SalesOrderId FK
    bit IsDropship
  }
  StockTransactionItems {
    bigint TransItemId PK
    bigint TransactionId FK
    int ProductId FK
    decimal Quantity
  }
  PdfTemplates {
    int TemplateId PK
    string TemplateCode
    string TemplateType
    string Language
  }
  CustomerPayments {
    int PaymentId PK
    int CustomerId FK
    int SalesOrderId FK
    decimal Amount
    string PaymentMethod
  }
  VendorPayments {
    int PaymentId PK
    int VendorId FK
    int VendorInvoiceId FK
    decimal Amount
  }
`);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
